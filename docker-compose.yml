version: '3.8'

services:
  db:
    image: postgres:17
    container_name: vava-restaurant
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vava-restaurant
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: vava_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vava.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
